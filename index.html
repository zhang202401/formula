        'modules/08-圆的切线/card03.html',
      ]},
      { id: 'sec9', num: 9, title: '关键词·概念关系', intro: '直线与圆的核心概念关联网络——理清概念间的推导关系，建立知识体系。', cards: [
        'modules/09-关键词/card01.html',
      ]},
      { id: 'sec10', num: 10, title: '考点·常考题型', intro: '福建中职学考「直线与圆」各模块常见考题——掌握每类题型的考法和公式。', cards: [
        'modules/10-考点/card01.html',
      ]},
    ];

    const contentContainer = document.getElementById('formulaContent');
    let loadedCount = 0;
    const totalModules = MODULES.length;

    // ===== Create section placeholders =====
    MODULES.forEach(mod => {
      const section = document.createElement('section');
      section.className = 'formula-section';
      section.id = mod.id;
      section.innerHTML = `
        <div class="section-header">
          <div class="section-number">${mod.num}</div>
          <h2>${mod.title}</h2>
        </div>
        <p class="section-intro">${mod.intro}</p>
        <div class="section-cards" id="cards-${mod.id}">
          <div class="section-loading"><span class="loading-spinner"></span> 加载中...</div>
        </div>
      `;
      contentContainer.appendChild(section);
    });

    // Also add footer
    const footer = document.createElement('footer');
    footer.className = 'content-footer';
    footer.innerHTML = '<p>中职数学 · 直线与圆 公式要点 · 可打印参考</p>';
    contentContainer.appendChild(footer);

    // ===== Load cards sequentially =====
    async function loadAllCards() {
      for (const mod of MODULES) {
        const cardsContainer = document.getElementById(`cards-${mod.id}`);
        const navLink = document.querySelector(`.sidebar-nav a[data-target="${mod.id}"]`);
        let hasError = false;

        for (const url of mod.cards) {
          try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const html = await resp.text();
            // Insert card
            const temp = document.createElement('div');
            temp.innerHTML = html;
            cardsContainer.appendChild(temp.firstElementChild || temp);
          } catch (e) {
            hasError = true;
            console.warn(`加载失败: ${url}`, e);
            const errCard = document.createElement('div');
            errCard.className = 'formula-card';
            errCard.innerHTML = `<div class="note warn">⚠ 加载失败: ${url}</div>`;
            cardsContainer.appendChild(errCard);
          }
        }

        // Remove loading indicator
        const loadingEl = cardsContainer.querySelector('.section-loading');
        if (loadingEl) loadingEl.remove();

        // Re-render KaTeX
        if (window.renderMathInElement) {
          try {
            renderMathInElement(cardsContainer, {
              delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '\\(', right: '\\)', display: false },
                { left: '\\[', right: '\\]', display: true },
              ],
              throwOnError: false,
              errorColor: '#D97706',
            });
          } catch(e) { /* KaTeX error - silently ignore */ }
        }

        // Update sidebar indicator
        loadedCount++;
        if (navLink) navLink.classList.add('loaded');
        document.getElementById('sidebarStatus').textContent = `${loadedCount} / ${totalModules} 模块已加载`;
      }

      // Update spinner
      const spinner = document.getElementById('mobileSpinner');
      if (spinner) spinner.style.display = 'none';
      document.getElementById('sidebarStatus').textContent = `${totalModules} 组公式分类`;
    }

    // ===== Sidebar functions =====
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebarBackdrop');
      const hamburger = document.getElementById('hamburger');
      if (window.innerWidth <= 900) {
        const isOpen = sidebar.style.display === 'flex';
        sidebar.style.display = isOpen ? 'none' : 'flex';
        backdrop.style.display = isOpen ? 'none' : 'block';
        if (!isOpen) requestAnimationFrame(() => backdrop.classList.add('show'));
        else backdrop.classList.remove('show');
        hamburger.classList.toggle('open');
        hamburger.setAttribute('aria-expanded', !isOpen);
      }
    }

    function handleResize() {
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebarBackdrop');
      const hamburger = document.getElementById('hamburger');
      if (window.innerWidth > 900) {
        sidebar.style.display = 'flex';
        backdrop.style.display = 'none';
        backdrop.classList.remove('show');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      } else if (!sidebar.classList.contains('show')) {
        sidebar.style.display = 'none';
      }
    }
    window.addEventListener('resize', handleResize);

    // ===== Scroll tracking =====
    function updateActiveSection() {
      const sections = document.querySelectorAll('.formula-section');
      const navLinks = document.querySelectorAll('.sidebar-nav a');
      let currentId = 'sec1';
      sections.forEach(s => {
        const rect = s.getBoundingClientRect();
        if (rect.top <= window.innerHeight * 0.35) currentId = s.id;
      });
      navLinks.forEach(link => {
        link.classList.toggle('active', link.getAttribute('data-target') === currentId);
      });
    }
    window.addEventListener('scroll', updateActiveSection, { passive: true });

    // ===== Sidebar click closes mobile menu =====
    document.querySelectorAll('.sidebar-nav a').forEach(link => {
      link.addEventListener('click', () => { if (window.innerWidth <= 900) toggleSidebar(); });
    });

    // ===== Init =====
    function initKaTeX() {
      if (typeof renderMathInElement === 'undefined') {
        setTimeout(initKaTeX, 200);
        return;
      }
      // Render hero section if needed
      loadAllCards();
    }

    // Wait for KaTeX auto-render to load
    if (typeof renderMathInElement !== 'undefined') {
      loadAllCards();
    } else {
      // The KaTeX auto-render script has onload=initKaTeX but we handle it manually
      const checkKatex = setInterval(() => {
        if (typeof renderMathInElement !== 'undefined') {
          clearInterval(checkKatex);
          loadAllCards();
        }
      }, 100);
      // Safety timeout
      setTimeout(() => clearInterval(checkKatex), 10000);
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && window.innerWidth <= 900) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.style.display === 'flex') toggleSidebar();
      }
    });

    handleResize();
    updateActiveSection();
  </script>
</body>
</html>
