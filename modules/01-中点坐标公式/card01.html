<div class="formula-card">
          <div class="label">中点坐标 <span class="sub">— 已知 \(A(x_1, y_1)\)、\(B(x_2, y_2)\)，中点 \(C(x_0, y_0)\)</span></div>
          <div class="formula">
            \[
            x_0 = \frac{x_1 + x_2}{2}, \qquad
            y_0 = \frac{y_1 + y_2}{2}
            \]
          </div>
          <div class="note">中点坐标是两端点坐标的算术平均数。反过来，若已知中点和一端点，也可求出另一端点。</div>
        </div>
