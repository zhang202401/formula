<div style="margin-top:1rem;">
          <div class="formula-card" style="background:#FAFBFC;border-style:dashed;">
            <div class="label">方程互化 <span class="sub">— 一般式 ↔ 斜截式</span></div>
            <div class="formula">
              \[
              Ax + By + C = 0 \;\Longrightarrow\; y = -\frac{A}{B}x - \frac{C}{B}
              \]
            </div>
            <div class="note">一般式化斜截式：移项 → 系数化为 1。反之同理。</div>
