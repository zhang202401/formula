<div class="formula-card">
            <div class="label">一般式</div>
            <div class="formula">
              \[
              Ax + By + C = 0
              \]
            </div>
            <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #F1F5F9;">
              <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:1.1rem;justify-content:center;">
                \[
                k = -\frac{A}{B} \qquad (B \neq 0)
                \]
                \[
                b = -\frac{C}{B} \qquad (B \neq 0)
                \]
              </div>
            </div>
            <div class="note">A、B 不同时为 0。<br>
              B ≠ 0 时直线有斜率；B = 0 时直线垂直于 x 轴。</div>
          </div>
