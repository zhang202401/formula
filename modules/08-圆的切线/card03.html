<div class="formula-card">
            <div class="label">过圆外一点 <span class="sub">— 求切线方程的一般步骤</span></div>
            <div class="formula">
              \[
              \begin{aligned}
              &\text{① 设切线：} y - y_0 = k(x - x_0) \\
              &\text{② 由圆心到切线距离 } d = r \text{ 求 } k \\
              &\text{③ 注意斜率不存在的情况需单独验证}
              \end{aligned}
            \]
          </div>
          <div class="note warn">⚠ 过圆外一点作切线通常有两条！不要遗漏斜率不存在的那一条。</div>
        </div>
