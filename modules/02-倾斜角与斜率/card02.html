          <div class="label">斜率公式 <span class="sub">— 定义式</span></div>
          <div class="formula">
            \[
            k = \tan\alpha \quad (\alpha \neq 90^\circ)
            \]
          </div>
          <div class="note warn">⚠ α = 90° 时直线垂直于 x 轴，斜率不存在。<br>💡 α = 0° 时 k = 0，直线平行于 x 轴。</div>
