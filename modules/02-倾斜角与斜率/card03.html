<div class="formula-card">
          <div class="label">斜率公式 <span class="sub">— 两点式</span></div>
          <div class="formula">
            \[
            k = \frac{y_2 - y_1}{x_2 - x_1} \quad (x_1 \neq x_2)
            \]
          </div>
          <div class="note">已知直线上两点 \(P_1(x_1, y_1)\)、\(P_2(x_2, y_2)\)，可用该公式求斜率。</div>
        </div>
