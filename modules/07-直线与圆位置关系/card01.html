<div class="relation-table">
          <div class="relation-row">
            <span class="condition">\(d < r\)</span>
            <span class="arrow">⇔</span>
            <span class="result">相交</span>
            <span class="result-detail">两个交点，弦长 \(= 2\sqrt{r^2 - d^2}\)</span>
          </div>
          <div class="relation-row">
            <span class="condition">\(d = r\)</span>
            <span class="arrow">⇔</span>
            <span class="result">相切</span>
            <span class="result-detail">一个交点（切点），\(d\) 即切点到圆心的距离</span>
          </div>
          <div class="relation-row">
            <span class="condition">\(d > r\)</span>
            <span class="arrow">⇔</span>
            <span class="result">相离</span>
            <span class="result-detail">无交点</span>
          </div>
        </div>
