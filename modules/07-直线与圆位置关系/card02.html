<div class="formula-card" style="margin-top:1rem;">
          <div class="label">弦长公式 <span class="sub">— 直线与圆相交时截得的弦长</span></div>
          <div class="formula">
            \[
            \text{弦长} = 2\sqrt{r^2 - d^2}
            \]
          </div>
          <div class="note">其中 d 为圆心到直线的距离，r 为圆的半径。弦长公式可利用垂径定理推导。</div>
        </div>
