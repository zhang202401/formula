<div class="formula-card">
            <div class="label">标准式 <span class="sub">— 圆心 \(C(a, b)\)，半径 \(r\)</span></div>
            <div class="formula">
              \[
              (x - a)^2 + (y - b)^2 = r^2
              \]
            </div>
            <div class="note">圆心为 \((a, b)\)，半径为 \(r\)。<br>特别地，圆心在原点时：\(x^2 + y^2 = r^2\)。</div>
          </div>
